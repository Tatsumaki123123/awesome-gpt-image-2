services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gpt_image
      POSTGRES_USER: gpt_image
      POSTGRES_PASSWORD: gpt_image
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpt_image -d gpt_image"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://gpt_image:gpt_image@db:5432/gpt_image
      APP_CONFIG_FILE: /app/config/app.config.json
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5003/api/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    expose:
      - "5003"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5003:80"

volumes:
  postgres_data:
